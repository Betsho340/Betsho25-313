<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Customer Feedback - BMW Nation</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- HEADER -->
<header>
  <div class="header-container">
    <img src="logo.png" alt="BMW Logo">
    <h1>BMW Nation</h1>
  </div>
</header>

<!-- NAVIGATION -->
<nav>
  <a href="index.html">Home</a>
  <a href="About-us.html">About Us</a>
  <a href="Cars.html">Cars</a>
  <a href="Contact-us.html">Contact Us</a>
  <a href="Feedback.html">Feedback</a>
</nav>

<main>

<!-- INTRO -->
<section>
  <article>
    <h2>Customer Feedback</h2>
    <p>We value your opinion. Share your experience with BMW Nation below.</p>
  </article>
</section>

<!-- FEEDBACK FORM -->
<section>

  <article>
    <h3>Leave Your Feedback</h3>

    <form id="feedbackForm">

      <label>Full Name</label>
      <input type="text" id="name" required>

      <label>Email</label>
      <input type="email" id="email" required>

      <label>Rating (1 - 5)</label>
      <input type="number" id="rating" min="1" max="5" required>

      <label>Your Feedback</label>
      <textarea id="message" rows="5" required></textarea>

      <button type="submit">Submit Feedback</button>

    </form>

  </article>

</section>

<!-- DISPLAY FEEDBACK -->
<section>
  <article>
    <h3>Recent Feedback</h3>
    <div id="feedbackList"></div>
  </article>
</section>

</main>

<!-- FOOTER -->
<footer>
  <p>BMW Nation © 2026</p>
</footer>

<script>
let feedbacks = JSON.parse(localStorage.getItem("feedbacks")) || [];

function renderFeedback() {
    const list = document.getElementById("feedbackList");
    list.innerHTML = "";

    feedbacks.forEach(fb => {
        list.innerHTML += `
        <div class="feedback-card">
            <h4>${fb.name} ⭐ ${fb.rating}/5</h4>
            <p>${fb.message}</p>
        </div>`;
    });
}

document.getElementById("feedbackForm").addEventListener("submit", function(e){
    e.preventDefault();

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let rating = document.getElementById("rating").value;
    let message = document.getElementById("message").value;

    if(name.length < 3 || message.length < 5){
        alert("Please fill in all fields properly.");
        return;
    }

    let newFeedback = { name, email, rating, message };
    feedbacks.push(newFeedback);

    localStorage.setItem("feedbacks", JSON.stringify(feedbacks));

    this.reset();
    renderFeedback();
});

renderFeedback();
</script>

</body>
</html>
