<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMW Cars</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #0b0b0b;
    color: white;
    font-family: Arial, sans-serif;
}

header {
    text-align: center;
    padding: 20px;
    background: black;
    border-bottom: 2px solid #1e90ff;
}

header h1 {
    color: #1e90ff;
    letter-spacing: 2px;
}

.car-grid {
    padding: 30px;
}

.car-card {
    background: #141414;
    border-radius: 15px;
    overflow: hidden;
    transition: 0.3s;
    border: 1px solid #222;
    height: 100%;
}

.car-card:hover {
    transform: scale(1.03);
    box-shadow: 0 0 15px #1e90ff;
}

.car-card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
}

.car-card h3 {
    text-align: center;
    padding: 10px;
    color: #fff;
}

.specs {
    padding: 10px 15px 20px;
    font-size: 14px;
    color: #ccc;
}

.specs p {
    margin: 4px 0;
}

.pagination-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
    padding: 20px;
}

.pagination-bar button {
    background: #1e90ff;
    border: none;
    padding: 10px 20px;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

.pagination-bar button:hover {
    background: #0d6efd;
}

footer {
    text-align: center;
    padding: 15px;
    background: black;
    border-top: 2px solid #1e90ff;
}
</style>
</head>

<body>

<header>
    <h1>BMW CARS SHOWROOM</h1>
</header>

<main class="container-fluid">

<section class="car-grid">
    <div class="row g-4" id="car-container"></div>
</section>

<div class="pagination-bar">
    <button onclick="prevPage()">Previous</button>
    <span id="page-number">1</span>
    <button onclick="nextPage()">Next</button>
</div>

</main>

<footer>
    <p>BMW Nation © 2026</p>
</footer>

<script>

// ✅ UPDATED CAR DATA WITH SPECS
const cars = [
    {
        name: "BMW M4",
        img: "images/m4.jpg",
        type: "Coupe",
        topSpeed: "290 km/h",
        engine: "3.0L Twin Turbo I6",
        horsepower: "503 HP"
    },
    {
        name: "BMW M3",
        img: "images/m3.jpg",
        type: "Sedan",
        topSpeed: "290 km/h",
        engine: "3.0L Twin Turbo I6",
        horsepower: "473 HP"
    },
    {
        name: "BMW X5",
        img: "images/x5.jpg",
        type: "SUV",
        topSpeed: "250 km/h",
        engine: "3.0L Turbo I6",
        horsepower: "375 HP"
    },
    {
        name: "BMW X6",
        img: "images/x6.jpg",
        type: "SUV Coupe",
        topSpeed: "250 km/h",
        engine: "3.0L Turbo I6",
        horsepower: "375 HP"
    },
    {
        name: "BMW i8",
        img: "images/i8.jpg",
        type: "Hybrid Sports",
        topSpeed: "250 km/h",
        engine: "1.5L Hybrid",
        horsepower: "369 HP"
    },
    {
        name: "BMW M5",
        img: "images/m5.jpg",
        type: "Sedan",
        topSpeed: "305 km/h",
        engine: "4.4L V8 Twin Turbo",
        horsepower: "617 HP"
    },
    {
        name: "BMW X3",
        img: "images/x3.jpg",
        type: "Compact SUV",
        topSpeed: "240 km/h",
        engine: "2.0L Turbo I4",
        horsepower: "248 HP"
    },
    {
        name: "BMW Z4",
        img: "images/z4.jpg",
        type: "Roadster",
        topSpeed: "250 km/h",
        engine: "3.0L Turbo I6",
        horsepower: "382 HP"
    },
    {
        name: "BMW 320i",
        img: "images/320i.jpg",
        type: "Sedan",
        topSpeed: "235 km/h",
        engine: "2.0L Turbo I4",
        horsepower: "184 HP"
    },
    {
        name: "BMW 330i",
        img: "images/330i.jpg",
        type: "Sedan",
        topSpeed: "250 km/h",
        engine: "2.0L Turbo I4",
        horsepower: "255 HP"
    }
];

const carsPerPage = 6;
let currentPage = 1;

function displayCars() {
    const container = document.getElementById("car-container");
    container.innerHTML = "";

    let start = (currentPage - 1) * carsPerPage;
    let end = start + carsPerPage;

    let paginatedCars = cars.slice(start, end);

    paginatedCars.forEach(car => {
        let col = document.createElement("div");
        col.className = "col-12 col-md-6 col-lg-4";

        col.innerHTML = `
            <div class="car-card">
                <img src="${car.img}" alt="${car.name}">
                <h3>${car.name}</h3>

                <div class="specs">
                    <p><strong>Type:</strong> ${car.type}</p>
                    <p><strong>Top Speed:</strong> ${car.topSpeed}</p>
                    <p><strong>Engine:</strong> ${car.engine}</p>
                    <p><strong>Power:</strong> ${car.horsepower}</p>
                </div>
            </div>
        `;

        container.appendChild(col);
    });

    document.getElementById("page-number").innerText = currentPage;
}

function nextPage() {
    if (currentPage * carsPerPage < cars.length) {
        currentPage++;
        displayCars();
    }
}

function prevPage() {
    if (currentPage > 1) {
        currentPage--;
        displayCars();
    }
}

displayCars();

</script>

</body>
</html>
