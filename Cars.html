<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMW Cars</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
    <h1>BMW Cars</h1>
</header>

<main>

<section class="car-grid" id="car-container">
    <!-- Cars will appear here -->
</section>

<nav class="pagination">
    <button onclick="prevPage()">Previous</button>
    <span id="page-number">1</span>
    <button onclick="nextPage()">Next</button>
</nav>

</main>

<footer>
    <p>BMW Nation</p>
</footer>

<!-- ✅ JAVASCRIPT INSIDE HTML -->
<script>
const cars = [
    { name: "BMW M4", img: "images/m4.jpg" },
    { name: "BMW M3", img: "images/m3.jpg" },
    { name: "BMW X5", img: "images/x5.jpg" },
    { name: "BMW X6", img: "images/x6.jpg" },
    { name: "BMW i8", img: "images/i8.jpg" },
    { name: "BMW M5", img: "images/m5.jpg" },
    { name: "BMW X3", img: "images/x3.jpg" },
    { name: "BMW Z4", img: "images/z4.jpg" },
    { name: "BMW 320i", img: "images/320i.jpg" },
    { name: "BMW 330i", img: "images/330i.jpg" }
];

const carsPerPage = 6;
let currentPage = 1;

function displayCars() {
    const container = document.getElementById("car-container");
    container.innerHTML = "";

    let start = (currentPage - 1) * carsPerPage;
    let end = start + carsPerPage;

    let paginatedCars = cars.slice(start, end);

    paginatedCars.forEach(car => {
        let article = document.createElement("article");
        article.classList.add("car");

        article.innerHTML = `
            <img src="${car.img}" alt="${car.name}">
            <h3>${car.name}</h3>
        `;

        container.appendChild(article);
    });

    document.getElementById("page-number").innerText = currentPage;
}

function nextPage() {
    if (currentPage * carsPerPage < cars.length) {
        currentPage++;
        displayCars();
    }
}

function prevPage() {
    if (currentPage > 1) {
        currentPage--;
        displayCars();
    }
}

// Load first page
displayCars();
</script>

</body>
</html>
