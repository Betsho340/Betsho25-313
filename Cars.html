<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMW Cars</title>

<!-- ✅ Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* =========================
   GLOBAL
========================= */
body {
    background: #f4f4f4;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    font-family: Arial, sans-serif;
}

/* =========================
   HEADER
========================= */
header {
    background: #111;
    color: white;
    padding: 15px;
    text-align: center;
}

/* =========================
   MAIN
========================= */
main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* =========================
   GRID AREA (FULL PAGE)
========================= */
#car-container {
    flex: 1;
    overflow: hidden; /* no scroll */

    display: flex;
    align-items: stretch;
}

/* Bootstrap row fix */
#car-container .row {
    width: 100%;
    margin: 0;
}

/* =========================
   CAR CARD
========================= */
.car-card {
    background: white;
    border-radius: 10px;
    overflow: hidden;
    transition: 0.3s;
    height: 100%;
}

.car-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

.car-card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.car-body {
    padding: 15px;
    text-align: center;
}

/* =========================
   PAGINATION
========================= */
.pagination-box {
    text-align: center;
    padding: 10px;
    background: #fff;
}

button {
    padding: 8px 20px;
    margin: 5px;
    border: none;
    background: #111;
    color: white;
    border-radius: 5px;
}

button:hover {
    background: #00aaff;
}

/* =========================
   FOOTER
========================= */
footer {
    background: #111;
    color: white;
    text-align: center;
    padding: 10px;
}

</style>
</head>

<body>

<header>
    <h1>BMW Cars Collection</h1>
</header>

<main>

<section id="car-container">
    <div class="row g-3 p-3" id="cars"></div>
</section>

<nav class="pagination-box">
    <button onclick="prevPage()">Previous</button>
    <span id="page-number">1</span>
    <button onclick="nextPage()">Next</button>
</nav>

</main>

<footer>
    <p>BMW Nation © 2026</p>
</footer>

<!-- ✅ JAVASCRIPT -->
<script>

const cars = [
    { name: "BMW M4", img: "images/m4.jpg" },
    { name: "BMW M3", img: "images/m3.jpg" },
    { name: "BMW X5", img: "images/x5.jpg" },
    { name: "BMW X6", img: "images/x6.jpg" },
    { name: "BMW i8", img: "images/i8.jpg" },
    { name: "BMW M5", img: "images/m5.jpg" },
    { name: "BMW X3", img: "images/x3.jpg" },
    { name: "BMW Z4", img: "images/z4.jpg" },
    { name: "BMW 320i", img: "images/320i.jpg" },
    { name: "BMW 330i", img: "images/330i.jpg" },
    { name: "BMW 740i", img: "images/740i.jpg" },
    { name: "BMW XM", img: "images/xm.jpg" }
];

const carsPerPage = 8;
let currentPage = 1;

function displayCars() {
    const container = document.getElementById("cars");
    container.innerHTML = "";

    let start = (currentPage - 1) * carsPerPage;
    let end = start + carsPerPage;
    let paginatedCars = cars.slice(start, end);

    paginatedCars.forEach(car => {
        container.innerHTML += `
            <div class="col-lg-3 col-md-4 col-sm-6">
                <article class="car-card">
                    <img src="${car.img}" alt="${car.name}">
                    <section class="car-body">
                        <h5>${car.name}</h5>
                    </section>
                </article>
            </div>
        `;
    });

    document.getElementById("page-number").innerText = currentPage;
}

function nextPage() {
    if (currentPage * carsPerPage < cars.length) {
        currentPage++;
        displayCars();
    }
}

function prevPage() {
    if (currentPage > 1) {
        currentPage--;
        displayCars();
    }
}

displayCars();

</script>

</body>
</html>
