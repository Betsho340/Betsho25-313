<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BMW Cars</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
  <div class="header-container">
    <img src="logo.png" alt="BMW Logo">
    <h1>BMW Nation</h1>
  </div>
</header>

<nav>
  <a href="index.html">Home</a>
  <a href="About-us.html">About Us</a>
  <a href="Cars.html">Cars</a>
  <a href="Contact-us.html">Contact Us</a>
</nav>

<main>

<section>
  <h2 style="text-align:center;">BMW Showroom</h2>

  <div class="car-grid" id="cars"></div>

  <div class="pagination">
    <button onclick="prevPage()">Previous</button>
    <span id="page-number">1</span>
    <button onclick="nextPage()">Next</button>
  </div>
</section>

</main>

<footer>
  <p>BMW Nation © 2026</p>
</footer>

<script>
const cars = [
    { name: "BMW M4", img: "images/m4.jpg" },
    { name: "BMW M3", img: "images/m3.jpg" },
    { name: "BMW X5", img: "images/x5.jpg" },
    { name: "BMW X6", img: "images/x6.jpg" },
    { name: "BMW i8", img: "images/i8.jpg" },
    { name: "BMW M5", img: "images/m5.jpg" },
    { name: "BMW X3", img: "images/x3.jpg" },
    { name: "BMW Z4", img: "images/z4.jpg" }
];

let currentPage = 1;
const carsPerPage = 8;

function displayCars() {
    const container = document.getElementById("cars");
    container.innerHTML = "";

    let start = (currentPage - 1) * carsPerPage;
    let end = start + carsPerPage;

    cars.slice(start, end).forEach(car => {
        container.innerHTML += `
        <article class="car-card">
            <img src="${car.img}" alt="${car.name}">
            <div class="car-body">
                <h3>${car.name}</h3>
            </div>
        </article>`;
    });

    document.getElementById("page-number").innerText = currentPage;
}

function nextPage() {
    if (currentPage * carsPerPage < cars.length) {
        currentPage++;
        displayCars();
    }
}

function prevPage() {
    if (currentPage > 1) {
        currentPage--;
        displayCars();
    }
}

displayCars();
</script>

</body>
</html>
